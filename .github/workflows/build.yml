name: build

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - goos: linux
            goarch: amd64
            suffix: linux-amd64
          - goos: darwin
            goarch: amd64
            suffix: darwin-amd64
          - goos: darwin
            goarch: arm64
            suffix: darwin-arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          CGO_ENABLED: 0
        run: |
          go build -ldflags="-s -w" -o ocs-${{ matrix.suffix }} .

      - name: Package
        run: |
          tar czf ocs-${{ matrix.suffix }}.tar.gz ocs-${{ matrix.suffix }}

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ocs-*.tar.gz
          generate_release_notes: true
